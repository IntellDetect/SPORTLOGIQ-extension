<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8">
<style>
  /* IntellDetect brand palette (company site). Defined once; the runtime panel reuses these vars. */
  :root{
    --text-primary:#000;--text-secondary:#fff;
    --bg-primary:#fff;--bg-secondary:#fafaf8;--bg-tertiary:#e6e7e8;--bg-quaternary:#0e0c0c;--bg-quinary:#f5f5f5;
    --button-primary:#0f2d52;
    --border-primary:#e6e7e8;--border-secondary:#737373;--border-tertiary:#000;
    --accent-primary:#fd6262;--accent-secondary:#ff6767;--accent-tertiary:#eed282;
    --overlay:#292828d4;
  }
  body{width:340px;margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:var(--bg-primary);color:var(--text-primary)}
  .header{display:flex;align-items:center;gap:12px;padding:16px 20px;border-bottom:1px solid var(--border-primary);background:var(--bg-secondary)}
  .header img{width:32px;height:32px;border-radius:6px}
  .header h1{margin:0;font-size:16px;font-weight:600;color:var(--text-primary)}
  .header .sub{font-size:11px;color:var(--border-secondary);margin-top:2px}
  .content{padding:20px}
  #login-view{display:flex;flex-direction:column;gap:14px;align-items:center;text-align:center}
  #login-view p{font-size:12px;color:var(--border-secondary);margin:0}
  #tg-login{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:11px 14px;border:none;border-radius:10px;background:var(--button-primary);color:var(--text-secondary);font-size:14px;font-weight:600;cursor:pointer}
  #tg-login:hover{background:#0c2444}
  #status{font-size:11px;color:var(--border-secondary);min-height:14px}
  #panel-root{display:none}
</style></head>
<body>
  <div class="header">
    <img src="icon48.png" alt="">
    <div><h1>Sportlogiq</h1><div class="sub">Annotation toolkit</div></div>
  </div>
  <div class="content">
    <!-- Pre-auth: the ONLY thing in the DOM is the login control. -->
    <div id="login-view">
      <p>Sign in with Telegram to enable annotation tools.</p>
      <button id="tg-login">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="#fff"><path d="M9.8 16.6l-.4 4c.6 0 .9-.3 1.2-.6l2.7-2.6 5.6 4.1c1 .6 1.8.3 2-1l3-13.9c.3-1.3-.5-1.8-1.4-1.5L2.3 9.7C1 10.2 1 11 2 11.3l5 1.6L18.7 6c.5-.3 1-.2.6.2"/></svg>
        Login with Telegram
      </button>
      <div id="status"></div>
    </div>
    <!-- Post-auth panel is injected here at runtime by popup.js (not present pre-login). -->
    <div id="panel-root"></div>
  </div>
  <script src="popup.js"></script>
</body></html>
