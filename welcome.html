<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><title>Sportlogiq</title>
<style>
  body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:#fafaf8;color:#000}
  .card{max-width:440px;padding:40px;background:#fff;border:1px solid #e6e7e8;border-radius:16px;text-align:center;box-shadow:0 8px 24px rgba(0,0,0,.06)}
  .card img{width:64px;height:64px;border-radius:12px;margin-bottom:16px}
  h1{font-size:20px;margin:0 0 8px}
  p{font-size:14px;color:#737373;line-height:1.55;margin:0 0 16px}
  #login{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 20px;border:none;
    border-radius:10px;background:#0f2d52;color:#fff;font-size:15px;font-weight:600;cursor:pointer}
  #login:hover{background:#0c2444}
  #status{font-size:13px;color:#737373;min-height:18px;margin-top:14px}
  #status.ok{color:#0f7a4f;background:#e9f9f1;border:1px solid #b7ebd2;border-radius:10px;
    padding:14px 16px;font-size:14px;font-weight:600;line-height:1.5}
  .hint{font-size:12px;color:#737373;margin-top:18px}
  b{color:#0f2d52}
</style></head>
<body>
  <div class="card">
    <img src="icon128.png" alt="">
    <h1>Welcome to Sportlogiq</h1>
    <p>Sign in with Telegram to turn the tools on — nothing runs until you do.</p>
    <button id="login">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="#fff"><path d="M9.8 16.6l-.4 4c.6 0 .9-.3 1.2-.6l2.7-2.6 5.6 4.1c1 .6 1.8.3 2-1l3-13.9c.3-1.3-.5-1.8-1.4-1.5L2.3 9.7C1 10.2 1 11 2 11.3l5 1.6L18.7 6c.5-.3 1-.2.6.2"/></svg>
      Login with Telegram
    </button>
    <div id="status"></div>
    <p class="hint">A Telegram tab opens — tap <b>Start</b> and you'll be brought right back. You can also sign in any time from the Sportlogiq toolbar icon.</p>
  </div>
  <script src="welcome.js"></script>
</body></html>
